
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CTP Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial}
#map{height:100vh}
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="ctp_places_data_v3.js"></script>

<script>
const map = L.map('map').setView([43.2,11.7],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map);

const places = window.CTP_PLACES_DATA;

places.forEach(p=>{
L.marker([p.lat,p.lng]).addTo(map)
.bindPopup("<b>"+p.name+"</b><br>"+p.city+"<br>"+p.address);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celiac Travel Platform - Coming Soon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Stili Generali */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Sfondo sfumato delicato */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: #333;
            text-align: center;
        }

        /* Contenitore principale */
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 85%;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Stile delle icone */
        .icons {
            font-size: 3.5rem;
            color: #ff758c; /* Colore vivace per le icone */
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        /* Titoli e Testi */
        h1 {
            margin: 0 0 15px;
            font-size: 2.2rem;
            color: #2c3e50;
        }

        .badge {
            display: inline-block;
            background: #ff758c;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }

        /* Footer / Copyright */
        .footer {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        /* Animazione di comparsa */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icons">
            <i class="fa-solid fa-plane-departure"></i>
            <i class="fa-solid fa-wheat-awn-circle-exclamation"></i>
        </div>

        <h1>Celiac Travel Platform</h1>
        <div class="badge">Coming Soon</div>
        
        <p>Our website is currently under construction!</p>
        <p>We are building a platform designed to make your <strong>gluten-free travels</strong> easier, safer, and truly unforgettable. We will be online very soon!</p>
        
        <p><em>Check back soon.</em></p>

        <div class="footer">
            &copy; 2026 Celiac Travel Platform. All rights reserved.
        </div>
    </div>

</body>
</html>

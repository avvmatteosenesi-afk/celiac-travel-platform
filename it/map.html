<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa | CTP</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f7f8;color:#1f2937;line-height:1.6}
header{background:#0F766E;color:#fff;padding:14px 20px;position:sticky;top:0;z-index:10}
.topbar{max-width:1100px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.topbar .brand{font-weight:bold}
.topbar .links{display:flex;gap:10px;flex-wrap:wrap}
.topbar a{color:#fff;text-decoration:none;font-weight:bold;background:rgba(255,255,255,.14);padding:8px 12px;border-radius:10px}
.container{max-width:1100px;margin:auto;padding:24px 20px}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold}
.green{background:#dcfce7;color:#166534}
.yellow{background:#fef3c7;color:#92400e}
.small{color:#6b7280;font-size:14px}
h1,h2,h3{margin-top:0}
a{color:#0F766E;text-decoration:none;font-weight:bold}
.photo-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.photo-ph{height:110px;background:linear-gradient(135deg,#d1fae5,#e2e8f0);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:13px;text-align:center;padding:10px}
.note{background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;padding:12px;margin-top:10px}
.btn{display:inline-block;background:#0F766E;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">Celiac Travel Platform</div>
    <div class="links">
      <a href="/it/index.html">Home Page</a>
      <a href="/map.html">EN</a>
    </div>
  </div>
</header>
<div class="container">
  <div class="card">
    <h1>Mappa</h1>
    <p>Per ora la versione italiana della mappa può reindirizzare alla mappa principale in inglese, finché non replichiamo completamente i filtri anche in italiano.</p>
    <p><a class="btn" href="/map.html">Apri la mappa principale</a></p>
  </div>
</div>
</body>
</html>
